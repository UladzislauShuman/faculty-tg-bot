# 1. Источники данных
data_source:
  type: web
  url: "https://fpmi.bsu.by/about" # Стартовая точка для краулера
  max_depth: 10 # Как глубоко уходить по ссылкам
  sitemap_only: false

# 2. Модель для векторизации (Embeddings)
# Используется для создания базы и поиска.
embedding_model:
  name: "intfloat/multilingual-e5-small" # Легкая модель, оптимизированная под CPU
  device: "cpu"
  normalize_embeddings: true # Важно для косинусного сходства

# 3. Модель для оценки (Evaluation)
# Используется только в тестах (main.py test) как независимый судья.
evaluation_model:
  name: "cointegrated/rubert-tiny2" # Очень быстрая русская модель
  device: "cpu"

# 3.5 Настройки LLM-судьи (Evaluation Metrics)
evaluation_metrics:
  enabled: true                # Флаг: false — используется старый evaluator
  judge_llm:
    type: "ollama"             # Тот же провайдер, что и у generation LLM
    model: "llama3.1"          # Должна быть загружена: ollama pull llama3.1
    temperature: 0.0           # Детерминированные оценки, быстрее TTFT
  metrics:
    faithfulness: true         # Проверка галлюцинаций
    answer_relevance: true     # Проверка релевантности ответа
  timeout_seconds: 60          # asyncio.wait_for timeout на каждый LLM-вызов

# 4. Настройки Поиска (Retrieval)
retrievers:
  active_type: "qdrant" # Варианты: chroma_bm25, qdrant

  # --- Qdrant ---
  qdrant:
    host: "localhost" # Замени на "qdrant", если запускаешь скрипты внутри Docker
    port: 6333
    collection_name: "fpmi_docs"
    search_k: 5

  # Настройки для векторного поиска (ChromaDB)
  vector_store:
    db_path_base: "data/chroma_db" # для генерации путей в тестах (data/chroma_db_markdown)
    db_path: "data/chroma_db" # путь по умолчанию для "продакшена" (Бот читает отсюда)
    search_k: 5 # Сколько документов изначально искать

  # Поиск по ключевым словам (Sparse retrieval)
  bm25:
    index_path_base: "data/bm25_index.pkl"
    index_path: "data/bm25_index.pkl"

  # Веса для гибридного поиска (сумма должна быть 1.0)
  hybrid_weights:
    vector: 0.7
    keyword: 0.3
  # Настройки для Re-ranker'а (Переранжирование)
  reranker:
    enabled: true            # Легкое включение/отключение для экспериментов
    type: "cross_encoder"
    model: "DiTy/cross-encoder-russian-msmarco"
    top_n: 3 # Сколько документов отдавать в LLM после переранжирования

# 5. Настройки LLM (Генерация)
providers:
  ollama:
    type: ollama
    model: "llama3.1"

  yandex_gpt:
    type: yandex_gpt
    model: "yandexgpt-lite"

# 6. Настройки тестирования (Evaluation)
evaluation_settings:
  mode: "all" # Варианты: all (всё), questions (только одиночные), scenarios (только диалоги)

# 6.5 RAG pipeline (Sprint 4: latency instrumentation)
rag_pipeline:
  stage_timing_logs:
    enabled: true   # false — без [TIMING] в логах (как до Sprint 4)

# 6.6 HyDE (Sprint 6: hypothetical document embeddings для dense-поиска)
# Включение: hyde.enabled: true — по умолчанию та же Ollama-модель, что и генерация ответов (providers.*), без лишних pull.
hyde:
  enabled: false
  llm:
    type: "ollama"
    model: "llama3.1"   # синхрон с providers.ollama.model при LLM_PROVIDER=ollama
    temperature: 0.7
  timeout_seconds: 1000    # под CPU можно увеличить; при частых таймаутах — tinyllama или false
  num_hypotheses: 2     # >1 — усреднение эмбеддингов гипотез, рост latency
  # true — строка INFO [HyDE] в консоли на каждый dense embed_query (+ HYDE_CONSOLE=1 в окружении)
  verbose_console: false

# 6.7 Индексация (main.py index): чанкер по умолчанию; CLI --chunker при указании перебивает yaml.
indexing:
  chunker: parent # markdown | semantic | unstructured | parent

parent_document:
  enabled: true
  child_chunk_size: 300
  parent_chunk_size: 1200
  docstore_path: "data/parent_docstore.pkl"

# 6.8 Семантический роутинг в Telegram-боте (Sprint 8)
# enabled: false — все пользовательские сообщения идут в RAG (как до спринта).
semantic_routing:
  enabled: true
  method: llm # regex | llm (llm — дополнительный вызов модели, см. semantic_routing.llm)
  timeout_seconds: 100 # только для method: llm (asyncio.wait_for)
  smalltalk_reply: "Здравствуйте! Я бот ФПМИ БГУ. Задайте вопрос о факультете — отвечу по официальным материалам из базы знаний."
  direct_link_reply: "Официальный сайт факультета: https://fpmi.bsu.by\nАктуальное расписание и объявления — в разделах сайта («Расписание», «Новости»)."
  llm:
    type: ollama
    model: llama3.1
    temperature: 0.0

# 7. Пути к файлам
paths:
  output_dir: "output"
  qa_test_set: "qa-test-set.yaml"
  indexing: "indexing.txt" # Сюда сохраняется текстовый дамп чанков
  run_bot: "answer.txt"    # Лог ответов бота
  retriever: "retriever.txt" # Лог работы ретривера
  sitemap: "sitemap.txt"
  test_pages_source: "test_pages_source.html"
  default_checkpoint_path: "check_points/default_checkpoint.json"
  pause_flag: "output/pause.flag"

# 8. Память диалога (Sprint 3: semantic / summary)
memory:
  enabled: true                  # false = старое скользящее окно без summary
  type: "summary_window"         # Тип: "summary_window" | "window"
  window_size: 2                 # Кол-во последних сырых реплик (пар Q/A) после summary
  summarization_threshold: 4     # Суммаризировать, когда answer_count >= этого значения
  summary_llm:
    type: "ollama"
    model: "llama3.1"
    temperature: 0.0
  summary_timeout_seconds: 90    # Суммаризация дольше ответа — больший таймаут

# 9. Матрица прогона (main.py test-matrix)
evaluation_scenarios:
  # Совпадает с быстрым пунктом 1 в test.sh: markdown, test, chroma_bm25, summary из config, --force-index
  - name: "baseline_like_test_sh"
    chunker: markdown
    index_mode: test
    force_index: true
    overrides: {}

  # Тот же профиль что baseline_like_test_sh, но HyDE для dense-поиска (hyde.llm — как в секции hyde выше / обычно та же модель, что генерация)
  - name: "chroma_bm25_hyde"
    chunker: markdown
    index_mode: test
    force_index: true
    overrides:
      hyde:
        enabled: true

  # Только Qdrant как backend; память как в базовом config.yaml
  - name: "qdrant"
    chunker: markdown
    index_mode: test
    force_index: false
    overrides:
      retrievers:
        active_type: qdrant

  # Как chroma_bm25_hyde, но backends Qdrant hybrid (dense+sparse); HyDE только на dense
  - name: "qdrant_hyde"
    chunker: markdown
    index_mode: test
    force_index: true
    overrides:
      retrievers:
        active_type: qdrant
      hyde:
        enabled: true

  # Qdrant + явный summary_window
  - name: "qdrant_summary_window"
    chunker: markdown
    index_mode: test
    force_index: false
    overrides:
      retrievers:
        active_type: qdrant
      memory:
        enabled: true
        type: summary_window

  # Qdrant + скользящее окно без LLM-суммаризации (контраст к qdrant_summary_window)
  - name: "qdrant_memory_window"
    chunker: markdown
    index_mode: test
    force_index: false
    overrides:
      retrievers:
        active_type: qdrant
      memory:
        enabled: true
        type: window