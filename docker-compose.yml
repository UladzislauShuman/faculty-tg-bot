services:
  # --- ТЕЛЕГРАМ БОТ ---
  bot:
    build: .
    container_name: rag_bot_service
    entrypoint: ["python", "-m", "src.tg_bot.server-startup"]
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
      # Если в контейнере падает резолв fpmi.bsu.by, править IP при смене хостинга БГУ
      - "fpmi.bsu.by:217.21.43.54"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST}
      - TGSERVER__TOKEN=${TGSERVER__TOKEN}
      - TGSERVER__WEBHOOK_URL=${TGSERVER__WEBHOOK_URL}
      # Базы данных
      - DB__HOST=postgres
      - DB__PORT=5432
      - DB__NAME=${DB__NAME}
      - DB__USER=${DB__USER}
      - DB__PASS=${DB__PASS}
      - QDRANT_HOST=qdrant
      # LLM Настройки
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - YANDEX_GPT_SECRET=${YANDEX_GPT_SECRET}
      # Трассировка и логи
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_ENDPOINT=${LANGCHAIN_ENDPOINT}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT}
      - ANONYMIZED_TELEMETRY=False
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./data:/app/data
      - ./output:/app/output
      - ./qa-test-set.yaml:/app/qa-test-set.yaml
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  # --- CLI ДЛЯ ИНДЕКСАЦИИ И ТЕСТОВ ---
  rag-cli:
    build: .
    container_name: rag_cli_prod
    entrypoint: ["tail", "-f", "/dev/null"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
      # Если в контейнере падает резолв fpmi.bsu.by, править IP при смене хостинга БГУ
      - "fpmi.bsu.by:217.21.43.54"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST}
      - DB__HOST=postgres
      - DB__PORT=5432
      - DB__NAME=${DB__NAME}
      - DB__USER=${DB__USER}
      - DB__PASS=${DB__PASS}
      - QDRANT_HOST=qdrant
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - TGSERVER__TOKEN=${TGSERVER__TOKEN}
      - TGSERVER__WEBHOOK_URL=${TGSERVER__WEBHOOK_URL}
      - YANDEX_GPT_SECRET=${YANDEX_GPT_SECRET}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_ENDPOINT=${LANGCHAIN_ENDPOINT}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT}
      - ANONYMIZED_TELEMETRY=False
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./data:/app/data
      - ./output:/app/output
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./qa-test-set.yaml:/app/qa-test-set.yaml
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  # --- ЛОКАЛЬНАЯ LLM (Ollama) ---
  ollama:
    image: ollama/ollama
    container_name: ollama_service_prod
    profiles: ["ollama-docker"]
    volumes:
      - ./ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  # --- ИСТОРИЯ И ПОЛЬЗОВАТЕЛИ (Postgres) ---
  postgres:
    image: postgres:16
    container_name: rag_postgres_prod
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB__NAME}
      POSTGRES_USER: ${DB__USER}
      POSTGRES_PASSWORD: ${DB__PASS}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB__USER} -d ${DB__NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- ВЕКТОРНАЯ БАЗА (Qdrant) ---
  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: qdrant_db
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local