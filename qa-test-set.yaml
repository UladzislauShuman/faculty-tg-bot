- url: "https://fpmi.bsu.by/enrollee"
  enabled: false
  questions:
    - q: "Какой проходной балл на бюджет на специальность 'Прикладная информатика' в 2025 году?"
      a: "Проходной балл на бюджет на специальность 'Прикладная информатика' в 2025 году составил 391."
    - q: "Сколько баллов нужно было набрать на платное на 'Информатику'?"
      a: "Проходной балл на платную форму обучения на специальность 'Информатика' составил 358."
    - q: "Какая специальность на ФПМИ самая требовательная по баллам на бюджет?"
      a: "Самый высокий проходной балл на бюджет у специальности 'Прикладная информатика' - 391."
    - q: "Когда приемная комиссия принимает документы на бюджетную форму обучения?"
      a: "Прием документов на бюджетную форму обучения осуществляется с 12 июля по 17 июля."
    - q: "До какого числа можно подать документы на платное?"
      a: "На платную форму обучения документы можно подать с 12 июля по 1 августа."
    - q: "Где находится приемная комиссия?"
      a: "Приемная комиссия находится по адресу: г. Минск, ул. Ленинградская, 8, аудитория 309, юридический факультет БГУ."
    - q: "Какой телефон у приемной комиссии БГУ?"
      a: "Телефон приемной комиссии БГУ: 209-50-85."
    - q: "Какие документы нужны для поступления?"
      a: "Для поступления нужны: заявление, оригиналы документа об образовании и сертификатов ЦТ, медицинская справка, документы о льготах и две цветные фотографии."
    - q: "Предоставляется ли общежитие первокурсникам?"
      a: "Да, всем иногородним нуждающимся первокурсникам предоставляется общежитие."
    - q: "Какая квалификация присваивается выпускникам специальности 'Кибербезопасность'?"
      a: "Выпускникам специальности 'Кибербезопасность' присваивается квалификация 'Специалист по кибербезопасности'."
    - q: "Сколько бюджетных мест на специальности 'Прикладная математика' в 2025 году?"
      a: "В 2025 году на специальность 'Прикладная математика' выделено 80 бюджетных мест."
    - q: "Можно ли получить военную специальность, обучаясь на ФПМИ?"
      a: "Да, студенты имеют возможность дополнительно получить военную специальность и звание офицера на военном факультете БГУ."

- url: "https://fpmi.bsu.by/master-degree"
  enabled: false
  questions:
    - q: "По какой специальности проходит обучение в магистратуре на ФПМИ?"
      a: "Обучение в магистратуре осуществляется по специальности 7-06-0533-05 'Прикладная математика и информатика'."
    - q: "Какие профилизации есть в магистратуре?"
      a: "В магистратуре есть две профилизации: 'Компьютерный анализ данных' и 'Интеллектуальные системы'."
    - q: "Сколько длится обучение в магистратуре?"
      a: "Срок обучения в магистратуре составляет 2 года."
    - q: "На каких языках можно учиться в магистратуре?"
      a: "Обучение в магистратуре проводится на русском и английском языках."
    - q: "Какую степень присваивают после окончания магистратуры?"
      a: "После окончания магистратуры присваивается степень «магистр»."
    - q: "Где и когда подавать документы в магистратуру в 2025 году?"
      a: "Подача документов в магистратуру в 2025 году осуществляется с 27 июня по 5 июля по адресу: пр. Независимости 4, ауд. 535."
    - q: "Какой телефон у приемной комиссии магистратуры факультета?"
      a: "Телефон приемной комиссии факультета для поступления в магистратуру: +375 17 209-55-38."
    - q: "Когда и где состоится вступительное испытание в магистратуру в 2025 году?"
      a: "Вступительное испытание состоится 8 июля 2025 года в 10:00 в ауд.535."
    - q: "В какой форме проходит вступительное испытание в магистратуру?"
      a: "Вступительное испытание в магистратуру проходит в устной форме."
    - q: "Кто имеет преимущественное право при зачислении в магистратуру при одинаковом количестве баллов?"
      a: "Преимущественное право имеют лица с дипломом с отличием, авторы научных работ, а также те, у кого выше средний балл диплома или больше стаж работы по специальности."
    - q: "Можно ли поступить в магистратуру без вступительных испытаний?"
      a: "Да, без вступительных испытаний зачисляются лауреаты специальных фондов Президента, победители международных студенческих олимпиад и иностранные граждане по международным договорам или грантам."

