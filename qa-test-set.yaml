- url: "https://fpmi.bsu.by/olympiads"
  enabled: false
  questions:
    - q: "Какие три основных этапа роста в программировании в формате ICPC?"
      a: "Три этапа: Командный чемпионат по программированию в РБ, Международная студенческая олимпиада (финал Северной Евразии) и Финал Студенческого командного чемпионата мира по программированию (ICPC)."
    - q: "Где и когда проходят этапы Командного Чемпионата по программированию РБ?"
      a: "Первый квалификационный этап проходит в октябре в удаленном формате, а заключительный очный этап — в ноябре на базе ФПМИ БГУ."
    - q: "Кто стал абсолютным победителем Командного Чемпионата по программированию УВО РБ 2024?"
      a: "Лучший результат показала команда БГУ, в состав которой вошли первокурсники Андрей Соболенко, Матвей Вылегжанин и второкурсник Дмитрий Анташкевич."
    - q: "Кто является одним из главных тренеров сборной БГУ по программированию?"
      a: "Одним из тренеров сборной неизменно выступает заведующий кафедрой дискретной математики и алгоритмики ФПМИ Владимир Котов."
    - q: "Что такое Международная олимпиада 'IT-Планета'?"
      a: "Это одно из самых масштабных соревнований в области информационных технологий в России и странах СНГ для студентов до 25 лет."
    - q: "Кто является главным тренером команды БГУ на олимпиаде 'IT-Планета'?"
      a: "Главным тренером и руководителем команды БГУ на олимпиаде 'IT-Планета' традиционно выступает старший преподаватель Анастасия Сергеевна Гусейнова."
    - q: "Какое самое престижное международное соревнование по математике среди студентов?"
      a: "Одним из самых престижных является Международная студенческая олимпиада по математике (IMC - International Mathematical Competition for University Students)."
    - q: "Сколько раз сборная БГУ становилась первой в мире в общекомандном зачете на IMC?"
      a: "Дважды сборная БГУ становилась первой в мире в общекомандном зачете на IMC."

- url: "https://fpmi.bsu.by/graduate"
  enabled: true
  questions:
    - q: "Каким документом регламентируется порядок прохождения преддипломной практики?"
      a: "Порядок прохождения преддипломной практики регламентируется Положением о практике студентов, курсантов, слушателей (утверждено постановлением Совета Министров Республики Беларусь от 03.06.2010 г. № 860)."
    - q: "Где найти программу производственной практики на 2024/2025 год?"
      a: "Программу производственной практики можно найти по ссылке: https://fpmi.bsu.by/sites/default/files/docs/%D0%A4%D0%9F%D0%9C%D0%98_%D0%A0%D0%B5%D0%B3-13539%D0%BF_2024_2025_%D0%9F%D1%80%D0%BE%D0%B8%D0%B7%D0%B2%D0%BE%D0%B4%D1%81%D1%82%D0%B2%D0%B5%D0%BD%D0%BD%D0%B0%D1%8F_%D0%BF%D1%80%D0%B0%D0%BA%D1%82%D0%B8%D0%BA%D0%B0.pdf"
    - q: "Есть ли шаблон договора на практику?"
      a: "Да, шаблон договора возмездного оказания услуг (практика) доступен для скачивания на сайте в разделе 'Преддипломная практика'."
    - q: "Где можно посмотреть программу государственного экзамена по специальности 'информатика'?"
      a: "Программу государственного экзамена по специальности 'информатика' можно посмотреть по ссылке: https://fpmi.bsu.by/sites/default/files/docs/State_exam_program_13651_2025__CS.pdf"
    - q: "По каким специальностям есть программы к госэкзамену?"
      a: "На сайте представлены программы к госэкзамену по специальностям: актуарная математика, прикладная математика, информатика, экономическая кибернетика, компьютерная безопасность, прикладная информатика."
    - q: "Какие документы регулируют распределение выпускников?"
      a: "Распределение регулируется Кодексом Республики Беларусь об образовании, Положением о порядке распределения (постановление Совмина № 572) и Положением о порядке возмещения средств."
    - q: "С какими организациями факультет имеет договоры о подготовке специалистов?"
      a: "Факультет имеет договоры с более чем 120 организациями, включая Национальный банк РБ, АСБ Беларусбанк, Приорбанк, ЭПАМ Системз, АйБиЭй АйТи Парк, Итранзишэн, НаучСофт, ЯндексБел и ОИПИ НАН Беларуси."
    - q: "Как составить запрос о распределении конкретного выпускника?"
      a: "Запрос о распределении составляется на официальном бланке предприятия с указанием почтового адреса. Образец можно скачать на сайте."
    - q: "Можно ли продолжить образование после окончания факультета?"
      a: "Да, выпускники могут продолжить образование в рамках второй ступени (магистратуры) и получить квалификацию магистра."

- url: "https://fpmi.bsu.by/departments"
  enabled: true
  questions:
    - q: "Какие кафедры есть на ФПМИ?"
      a: "На факультете есть кафедры: биомедицинской информатики, фундаментальной математики и интеллектуальных систем, вычислительной математики, дискретной математики и алгоритмики, информационных систем управления, компьютерных технологий и систем, математического моделирования и анализа данных, методов оптимального управления, многопроцессорных систем и сетей, теории вероятностей и математической статистики, технологий программирования."
    - q: "В каком кабинете находится кафедра биомедицинской информатики?"
      a: "Кафедра биомедицинской информатики находится в кабинете 533 (проспект Независимости, дом 4)."
    - q: "Какой телефон у кафедры компьютерных технологий и систем?"
      a: "Телефон кафедры компьютерных технологий и систем: 209-50-79."
    - q: "Где найти кафедру теории вероятностей?"
      a: "Кафедра теории вероятностей и математической статистики находится на проспекте Независимости, дом 4, кабинет 548, телефон 209-51-29."
    - q: "Есть ли на факультете кафедра методов оптимального управления?"
      a: "Да, кафедра методов оптимального управления есть. Она находится в кабинете 528, телефон 209-50-74."
    - q: "Какой номер кабинета у кафедры многопроцессорных систем и сетей?"
      a: "Кафедра многопроцессорных систем и сетей располагается в кабинете 540."
    - q: "Как связаться с кафедрой дискретной математики и алгоритмики?"
      a: "Связаться с кафедрой дискретной математики и алгоритмики можно по телефону 209-50-80 (заведующий) или 209-54-71 (кабинет 530)."
    - q: "Какие научные лаборатории есть при кафедре вычислительной математики?"
