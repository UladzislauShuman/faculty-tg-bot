# https://fpmi.bsu.by/olympiads
- question: "Какие три основных этапа роста в программировании в формате ICPC?"
  answer: "Три этапа: Командный чемпионат по программированию в РБ, Международная студенческая олимпиада (финал Северной Евразии) и Финал Студенческого командного чемпионата мира по программированию (ICPC)."
- question: "Где и когда проходят этапы Командного Чемпионата по программированию РБ?"
  answer: "Первый квалификационный этап проходит в октябре в удаленном формате, а заключительный очный этап — в ноябре на базе ФПМИ БГУ."
- question: "Кто стал абсолютным победителем Командного Чемпионата по программированию УВО РБ 2024?"
  answer: "Лучший результат показала команда БГУ, в состав которой вошли первокурсники Андрей Соболенко, Матвей Вылегжанин и второкурсник Дмитрий Анташкевич."
- question: "Кто является одним из главных тренеров сборной БГУ по программированию?"
  answer: "Одним из тренеров сборной неизменно выступает заведующий кафедрой дискретной математики и алгоритмики ФПМИ Владимир Котов."
- question: "Что такое Международная олимпиада 'IT-Планета'?"
  answer: "Это одно из самых масштабных соревнований в области информационных технологий в России и странах СНГ для студентов до 25 лет."
- question: "Кто является главным тренером команды БГУ на олимпиаде 'IT-Планета'?"
  answer: "Главным тренером и руководителем команды БГУ на олимпиаде 'IT-Планета' традиционно выступает старший преподаватель Анастасия Сергеевна Гусейнова."
- question: "Какое самое престижное международное соревнование по математике среди студентов?"
  answer: "Одним из самых престижных является Международная студенческая олимпиада по математике (IMC - International Mathematical Competition for University Students)."
- question: "Сколько раз сборная БГУ становилась первой в мире в общекомандном зачете на IMC?"
  answer: "Дважды сборная БГУ становилась первой в мире в общекомандном зачете на IMC."

# https://fpmi.bsu.by/graduate
- question: "Каким документом регламентируется порядок прохождения преддипломной практики?"
  answer: "Порядок прохождения преддипломной практики регламентируется Положением о практике студентов, курсантов, слушателей (утверждено постановлением Совета Министров Республики Беларусь от 03.06.2010 г. № 860)."
- question: "Где найти программу производственной практики на 2024/2025 год?"
  answer: "Программу производственной практики можно найти по ссылке: https://fpmi.bsu.by/sites/default/files/docs/%D0%A4%D0%9F%D0%9C%D0%98_%D0%A0%D0%B5%D0%B3-13539%D0%BF_2024_2025_%D0%9F%D1%80%D0%BE%D0%B8%D0%B7%D0%B2%D0%BE%D0%B4%D1%81%D1%82%D0%B2%D0%B5%D0%BD%D0%BD%D0%B0%D1%8F_%D0%BF%D1%80%D0%B0%D0%BA%D1%82%D0%B8%D0%BA%D0%B0.pdf"
- question: "Есть ли шаблон договора на практику?"
  answer: "Да, шаблон договора возмездного оказания услуг (практика) доступен для скачивания на сайте в разделе 'Преддипломная практика'."
- question: "Где можно посмотреть программу государственного экзамена по специальности 'информатика'?"
  answer: "Программу государственного экзамена по специальности 'информатика' можно посмотреть по ссылке: https://fpmi.bsu.by/sites/default/files/docs/State_exam_program_13651_2025__CS.pdf"
- question: "По каким специальностям есть программы к госэкзамену?"
  answer: "На сайте представлены программы к госэкзамену по специальностям: актуарная математика, прикладная математика, информатика, экономическая кибернетика, компьютерная безопасность, прикладная информатика."
- question: "Какие документы регулируют распределение выпускников?"
  answer: "Распределение регулируется Кодексом Республики Беларусь об образовании, Положением о порядке распределения (постановление Совмина № 572) и Положением о порядке возмещения средств."
- question: "С какими организациями факультет имеет договоры о подготовке специалистов?"
  answer: "Факультет имеет договоры с более чем 120 организациями, включая Национальный банк РБ, АСБ Беларусбанк, Приорбанк, ЭПАМ Системз, АйБиЭй АйТи Парк, Итранзишэн, НаучСофт, ЯндексБел и ОИПИ НАН Беларуси."
- question: "Как составить запрос о распределении конкретного выпускника?"
  answer: "Запрос о распределении составляется на официальном бланке предприятия с указанием почтового адреса. Образец можно скачать на сайте."
- question: "Можно ли продолжить образование после окончания факультета?"
  answer: "Да, выпускники могут продолжить образование в рамках второй ступени (магистратуры) и получить квалификацию магистра."

# https://fpmi.bsu.by/departments
- question: "Какие кафедры есть на ФПМИ?"
  answer: "На факультете есть кафедры: биомедицинской информатики, фундаментальной математики и интеллектуальных систем, вычислительной математики, дискретной математики и алгоритмики, информационных систем управления, компьютерных технологий и систем, математического моделирования и анализа данных, методов оптимального управления, многопроцессорных систем и сетей, теории вероятностей и математической статистики, технологий программирования."
- question: "В каком кабинете находится кафедра биомедицинской информатики?"
  answer: "Кафедра биомедицинской информатики находится в кабинете 533 (проспект Независимости, дом 4)."
- question: "Какой телефон у кафедры компьютерных технологий и систем?"
  answer: "Телефон кафедры компьютерных технологий и систем: 209-50-79."
- question: "Где найти кафедру теории вероятностей?"
  answer: "Кафедра теории вероятностей и математической статистики находится на проспекте Независимости, дом 4, кабинет 548, телефон 209-51-29."
- question: "Есть ли на факультете кафедра методов оптимального управления?"
  answer: "Да, кафедра методов оптимального управления есть. Она находится в кабинете 528, телефон 209-50-74."
- question: "Какой номер кабинета у кафедры многопроцессорных систем и сетей?"
  answer: "Кафедра многопроцессорных систем и сетей располагается в кабинете 540."
- question: "Как связаться с кафедрой дискретной математики и алгоритмики?"
  answer: "Связаться с кафедрой дискретной математики и алгоритмики можно по телефону 209-50-80 (заведующий) или 209-54-71 (кабинет 530)."
- question: "Какие научные лаборатории есть при кафедре вычислительной математики?"
  answer: "При кафедре вычислительной математики есть НИЛ (кабинет 525, телефон 209-50-63)."
- question: "Где можно найти информацию о защитах диссертаций на кафедре ИСУ?"
  answer: "Информация о сотрудниках и аспирантах кафедры ИСУ, защитивших диссертации, доступна в документе по ссылке на странице кафедр (https://fpmi.bsu.by/sites/default/files/docs/2025.06.26.%20%D0%97%D0%B0%D1%89%D0%B8%D1%82%D1%8B%20%D0%BD%D0%B0%20%D0%BA%D0%B0%D1%84%D0%B5%D0%B4%D1%80%D0%B5%20%D0%98%D0%A1%D0%A3.doc)."

# https://fpmi.bsu.by/science
- question: "Какие приоритетные направления научных исследований реализуются на ФПМИ?"
  answer: "Научные исследования проводятся в соответствии с приоритетными направлениями, утвержденными Указом Президента РБ № 156 от 7 мая 2020 г. на 2021-2025 годы."
- question: "Сколько НИР, финансируемых из госбюджета, выполнялось на факультете в 2024 году?"
  answer: "В 2024 году на ФПМИ выполнялось 13 НИР, финансируемых за счет государственного бюджета."
- question: "Какие институты созданы на базе факультета?"
  answer: "На базе факультета работают Институт повышения квалификации и переподготовки в области технологий информатизации и управления БГУ и Научно-исследовательский институт прикладных проблем математики и информатики (НИИ ППМИ)."
- question: "Кто является председателем Совета молодых учёных ФПМИ?"
  answer: "Председателем Совета молодых учёных является Молочко Илья Павлович, старший преподаватель кафедры дискретной математики и алгоритмики (тел. 209-54-71)."
- question: "Какие академики НАН Беларуси работают на факультете?"
  answer: "На факультете работают по совместительству два академика НАН Беларуси: Абламейко Сергей Владимирович и Харин Юрий Семенович."
- question: "Кто является основоположником научной школы 'Математические методы оптимального управления'?"
  answer: "Основоположником школы является первый заведующий кафедрой методов оптимального управления Рафаил Фёдорович Габасов."
- question: "Какая научная школа функционирует под руководством профессоров Левакова и Васьковского?"
  answer: "Под руководством профессоров А.А. Левакова и М.М. Васьковского функционирует научная школа «Стохастические дифференциальные уравнения»."
- question: "Где и когда прошел 11-й Международный конгресс по информатике CSIST'2025?"
  answer: "11-й Международный конгресс по информатике (CSIST'2025) прошел в БГУ на базе факультета в период 29-31 октября 2025 года."
- question: "Сколько научных статей опубликовали сотрудники ФПМИ в 2024 году?"
  answer: "В 2024 году сотрудники ФПМИ опубликовали 212 научных статей, из них 140 в Республике Беларусь и 72 за рубежом."
- question: "Когда проводятся «Восьмые Богдановские чтения»?"
  answer: "Международная математическая конференция «Восьмые Богдановские чтения. Дифференциальные уравнения» проводится со 02 по 05 декабря 2025 года."

