- question: "Где можно найти правила внутреннего трудового распорядка БГУ?"
  answer: "Правила внутреннего трудового распорядка БГУ можно найти по ссылке на странице 'Нормативные документы для сотрудников'."
- question: "Где куратору найти материалы для информационных часов?"
  answer: "Материалы в помощь куратору для кураторских и информационных часов доступны по ссылке на облачном хранилище (nextcloud.bsu.by)."
- question: "Кто является председателем профбюро ФПМИ?"
  answer: "Председателем профбюро ФПМИ является Кондратьева Ольга Михайловна."
- question: "Кто отвечает за спортивную работу в профбюро?"
  answer: "Ответственным за спортивную работу в профбюро является Пирштук Иван Казимирович."
- question: "Какую должность в профбюро занимает Утрушкина Елена Владимировна?"
  answer: "Утрушкина Елена Владимировна ответственна за информационную часть и культмассовую работу."
- question: "Кто является общественным инспектором по охране труда на факультете?"
  answer: "Общественным инспектором по охране труда является Кадурина Ольга Григорьевна."
- question: "Какие мероприятия запланированы профбюро на 2024/2025 год?"
  answer: "В плане работы профбюро: новогодние праздники для детей, посещение театров и выставок, празднование Дня факультета, спартакиада, оздоровление сотрудников, экскурсии."
- question: "Какое место заняла команда ФПМИ в спартакиаде работников БГУ в 2025 году?"
  answer: "Команда ФПМИ заняла итоговое 8-е место из 20 команд-участников в спартакиаде работников БГУ."
- question: "Кто занял 2-е место в соревнованиях по шахматам на спартакиаде?"
  answer: "Команда ФПМИ заняла 2-е место в шахматах. За команду играли Мороз А.С., Комаровский И.В., Полевиков В.К., Гайдук А.Н. и Мицкевич М.Н."