    - q: "Где можно найти информацию о защитах диссертаций на кафедре ИСУ?"
      a: "Информация о сотрудниках и аспирантах кафедры ИСУ, защитивших диссертации, доступна в документе по ссылке на странице кафедр (https://fpmi.bsu.by/sites/default/files/docs/2025.06.26.%20%D0%97%D0%B0%D1%89%D0%B8%D1%82%D1%8B%20%D0%BD%D0%B0%20%D0%BA%D0%B0%D1%84%D0%B5%D0%B4%D1%80%D0%B5%20%D0%98%D0%A1%D0%A3.doc)."

- url: "https://fpmi.bsu.by/science"
  enabled: true
  questions:
    - q: "Какие приоритетные направления научных исследований реализуются на ФПМИ?"
      a: "Научные исследования проводятся в соответствии с приоритетными направлениями, утвержденными Указом Президента РБ № 156 от 7 мая 2020 г. на 2021-2025 годы."
    - q: "Сколько НИР, финансируемых из госбюджета, выполнялось на факультете в 2024 году?"
      a: "В 2024 году на ФПМИ выполнялось 13 НИР, финансируемых за счет государственного бюджета."
    - q: "Какие институты созданы на базе факультета?"
      a: "На базе факультета работают Институт повышения квалификации и переподготовки в области технологий информатизации и управления БГУ и Научно-исследовательский институт прикладных проблем математики и информатики (НИИ ППМИ)."
    - q: "Кто является председателем Совета молодых учёных ФПМИ?"
      a: "Председателем Совета молодых учёных является Молочко Илья Павлович, старший преподаватель кафедры дискретной математики и алгоритмики (тел. 209-54-71)."
    - q: "Какие академики НАН Беларуси работают на факультете?"
      a: "На факультете работают по совместительству два академика НАН Беларуси: Абламейко Сергей Владимирович и Харин Юрий Семенович."
    - q: "Кто является основоположником научной школы 'Математические методы оптимального управления'?"
      a: "Основоположником школы является первый заведующий кафедрой методов оптимального управления Рафаил Фёдорович Габасов."
    - q: "Какая научная школа функционирует под руководством профессоров Левакова и Васьковского?"
      a: "Под руководством профессоров А.А. Левакова и М.М. Васьковского функционирует научная школа «Стохастические дифференциальные уравнения»."
    - q: "Где и когда прошел 11-й Международный конгресс по информатике CSIST'2025?"
      a: "11-й Международный конгресс по информатике (CSIST'2025) прошел в БГУ на базе факультета в период 29-31 октября 2025 года."
    - q: "Сколько научных статей опубликовали сотрудники ФПМИ в 2024 году?"
