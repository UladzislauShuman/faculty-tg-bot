- url: "https://fpmi.bsu.by/olympiads"
  enabled: true
  questions:
    - q: "Какие три основных этапа роста в программировании в формате ICPC?"
      a: "Три этапа: Командный чемпионат по программированию в РБ, Международная студенческая олимпиада (финал Северной Евразии) и Финал Студенческого командного чемпионата мира по программированию (ICPC)."
    - q: "Где и когда проходят этапы Командного Чемпионата по программированию РБ?"
      a: "Первый квалификационный этап проходит в октябре в удаленном формате, а заключительный очный этап — в ноябре на базе ФПМИ БГУ."
    - q: "Кто стал абсолютным победителем Командного Чемпионата по программированию УВО РБ 2024?"
      a: "Лучший результат показала команда БГУ, в состав которой вошли первокурсники Андрей Соболенко, Матвей Вылегжанин и второкурсник Дмитрий Анташкевич."
    - q: "Кто является одним из главных тренеров сборной БГУ по программированию?"
      a: "Одним из тренеров сборной неизменно выступает заведующий кафедрой дискретной математики и алгоритмики ФПМИ Владимир Котов."
    - q: "Что такое Международная олимпиада 'IT-Планета'?"
      a: "Это одно из самых масштабных соревнований в области информационных технологий в России и странах СНГ для студентов до 25 лет."
    - q: "Кто является главным тренером команды БГУ на олимпиаде 'IT-Планета'?"
      a: "Главным тренером и руководителем команды БГУ на олимпиаде 'IT-Планета' традиционно выступает старший преподаватель Анастасия Сергеевна Гусейнова."
    - q: "Какое самое престижное международное соревнование по математике среди студентов?"
      a: "Одним из самых престижных является Международная студенческая олимпиада по математике (IMC - International Mathematical Competition for University Students)."
    - q: "Сколько раз сборная БГУ становилась первой в мире в общекомандном зачете на IMC?"
      a: "Дважды сборная БГУ становилась первой в мире в общекомандном зачете на IMC."
  scenarios:
    - name: "Длинный сценарий: Путь программиста и тренеры (Тест на 6 шагов)"
      steps:
        - q: "Какие основные этапы роста есть в программировании ICPC?"
          a: "Три этапа: Командный чемпионат РБ, финал Северной Евразии и Мировой финал ICPC."
        - q: "Где и когда проходит именно белорусский чемпионат?"
          a: "Квалификация в октябре (удаленно), финал в ноябре на базе ФПМИ БГУ."
        - q: "Кто стал его абсолютным победителем в 2024 году?"
          a: "Команда БГУ в составе: Андрей Соболенко, Матвей Вылегжанин и Дмитрий Анташкевич."
        - q: "А кто является главным тренером этой сборной?"
          a: "Владимир Котов."
        - q: "На какой кафедре он работает?"
          a: "На кафедре дискретной математики и алгоритмики."
        - q: "Какие еще соревнования он курирует на факультете?" # Шаг 6: Проверка, помнит ли бот, что "он" — это Котов из 4-5 шага.
          a: "В контексте указано, что он неизменно выступает тренером сборной по программированию (ICPC)."

    - name: "Сценарий: Математические успехи"
      steps:
        - q: "Какое международное соревнование по математике считается самым престижным?"
          a: "Международная студенческая олимпиада по математике (IMC)."
        - q: "Сколько раз команда нашего университета была там первой в мире?"
          a: "Сборная БГУ дважды становилась первой в мире в общекомандном зачете IMC."

